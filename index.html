<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مبدعي المستقبل | الموقع الرسمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= المتغيرات الأساسية ================= */
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary: #8b5cf6;
            --secondary-glow: rgba(139, 92, 246, 0.5);
            --bg-dark: #070913;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* ================= الإعدادات العامة ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent; /* إزالة لون الضغطة الافتراضي بالموبايل */
        }

        /* ================= الخلفية الديناميكية المتحركة ================= */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatOrb 20s infinite alternate ease-in-out;
            will-change: transform;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-glow);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary-glow);
            bottom: -20%;
            right: -10%;
            animation-duration: 30s;
            animation-direction: alternate-reverse;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(14, 165, 233, 0.4);
            top: 40%;
            left: 40%;
            animation-duration: 20s;
        }

        /* ================= شريط التنقل (Header) ================= */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeDown 1s ease forwards;
            opacity: 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(to left, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ================= القسم الرئيسي (Hero Section) ================= */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80vh;
            padding: 0 5%;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        .hero-content {
            flex: 1;
        }

        .hero-tagline {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            opacity: 0;
            animation: fadeUp 0.8s ease 0.3s forwards;
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.5s forwards;
        }

        .hero-title span {
            background: linear-gradient(to right, #3b82f6, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shineText 4s linear infinite;
        }

        .hero-desc {
            font-size: 1.2rem;
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            max-width: 600px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.7s forwards;
        }

        /* ================= أزرار التحميل ================= */
        .download-buttons {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.9s forwards;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: translateY(2px) scale(0.98); /* تأثير الضغط للموبايل */
        }

        .btn:hover::before {
            left: 150%;
        }

        .btn-pc:hover { box-shadow: 0 10px 40px rgba(0, 164, 239, 0.3); }
        .btn-pc:hover i { color: #00a4ef; } 

        .btn-ios:hover { box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2); }
        .btn-ios:hover i { color: #ffffff; }

        .btn-android:hover { box-shadow: 0 10px 40px rgba(61, 220, 132, 0.3); }
        .btn-android:hover i { color: #3ddc84; } 

        .btn i {
            font-size: 1.8rem;
            transition: color 0.3s ease;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn-text span:first-child {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
        }

        /* ================= صورة التطبيق (الجهة اليسرى) ================= */
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
            opacity: 0;
            animation: zoomIn 1s ease 1s forwards, floatImage 6s ease-in-out infinite 2s;
        }

        .hero-image::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(60px);
            opacity: 0.5;
            animation: pulseGlow 4s infinite alternate;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 
                        0 0 30px rgba(255, 255, 255, 0.05) inset;
            border: 1px solid var(--glass-border);
            transform: perspective(1000px) rotateY(-5deg) rotateX(5deg);
            transition: transform 0.5s ease;
        }

        .hero-image img:hover {
            transform: perspective(1000px) rotateY(0deg) rotateX(0deg) scale(1.05);
        }

        /* ================= الحركات (Keyframes) ================= */
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floatImage {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* ================= تخصيص احترافي للموبايل والأجهزة اللوحية ================= */
        @media (max-width: 992px) {
            header {
                justify-content: center; /* توسيط الشعار في الموبايل */
                padding: 1.5rem 5%;
            }
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 1.5rem;
                padding-bottom: 3rem;
                gap: 1rem;
            }
            .hero-tagline {
                font-size: 0.8rem;
                padding: 6px 14px;
            }
            .hero-title {
                font-size: 2.4rem; /* تصغير العنوان ليتناسب مع الشاشة */
                margin-bottom: 1rem;
            }
            .hero-desc {
                font-size: 1rem;
                margin: 0 auto 2rem;
                padding: 0 10px;
                line-height: 1.6;
            }
            
            /* تحويل الأزرار لشكل عمودي (كأنها داخل تطبيق) */
            .download-buttons {
                flex-direction: column;
                align-items: center;
                width: 100%;
                gap: 1rem;
            }
            
            .btn {
                width: 100%;
                max-width: 320px; /* توحيد عرض الأزرار */
                justify-content: center; /* توسيط محتوى الزر */
                padding: 16px 20px;
            }
            
            /* تعديل الصورة في الموبايل */
            .hero-image {
                margin-top: 2rem;
                width: 100%;
            }
            
            .hero-image::after {
                width: 200px;
                height: 200px;
                filter: blur(40px);
            }
            
            .hero-image img {
                max-width: 85%; /* منع الصورة من أخذ حجم أكبر من الشاشة */
                transform: none; /* إلغاء الميلان 3D في الموبايل ليكون أوضح */
            }
            
            .hero-image img:hover {
                transform: translateY(-5px);
            }
            
            /* تصغير حجم فقاعات الخلفية لعدم إرباك الموبايل */
            .orb-1 { width: 250px; height: 250px; }
            .orb-2 { width: 300px; height: 300px; }
            .orb-3 { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

</body>
</html>
