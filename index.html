<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق مبدعي المستقبل | الموقع الرسمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= المتغيرات الأساسية ================= */
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary: #8b5cf6;
            --secondary-glow: rgba(139, 92, 246, 0.5);
            --bg-dark: #070913;
            --text-light: #f8fafc;
        }

        /* ================= الإعدادات العامة ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        /* ================= الخلفية الديناميكية ================= */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-glow);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary-glow);
            bottom: -20%;
            right: -10%;
            animation-duration: 30s;
            animation-direction: alternate-reverse;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(14, 165, 233, 0.4);
            top: 40%;
            left: 40%;
            animation-duration: 20s;
        }

        /* ================= الهيدر والقسم الرئيسي ================= */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeDown 1s ease forwards;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(to left, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 80vh;
            padding: 0 5%;
            gap: 2rem;
            position: relative;
            z-index: 1;
        }

        .hero-content { flex: 1; }

        .hero-tagline {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: fadeUp 0.8s ease 0.3s forwards;
            opacity: 0;
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.8s ease 0.5s forwards;
            opacity: 0;
        }

        .hero-title span {
            background: linear-gradient(to right, #3b82f6, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shineText 4s linear infinite;
        }

        .hero-desc {
            font-size: 1.2rem;
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            max-width: 600px;
            animation: fadeUp 0.8s ease 0.7s forwards;
            opacity: 0;
        }

        /* ================= أزرار التحميل (تصميم عالمي حديث) ================= */
        .download-buttons {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            animation: fadeUp 0.8s ease 0.9s forwards;
            opacity: 0;
        }

        .btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 24px;
            border-radius: 16px; /* تدوير حديث وناعم */
            background: rgba(255, 255, 255, 0.03); /* زجاج شفاف جداً */
            border: 1px solid rgba(255, 255, 255, 0.08); /* إطار رقيق */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            overflow: hidden;
        }

        /* لمعة داخلية ناعمة جداً تظهر عند المرور */
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn i {
            font-size: 1.8rem;
            z-index: 1;
            transition: all 0.4s ease;
        }

        /* ألوان الأيقونات والحدود حسب المنصة */
        .btn-pc i { color: #60a5fa; /* أزرق ويندوز ناعم */ }
        .btn-pc:hover { border-color: rgba(96, 165, 250, 0.4); box-shadow: 0 10px 30px -10px rgba(96, 165, 250, 0.15); }

        .btn-ios i { color: #f8fafc; /* أبيض آبل */ }
        .btn-ios:hover { border-color: rgba(248, 250, 252, 0.4); box-shadow: 0 10px 30px -10px rgba(248, 250, 252, 0.15); }

        .btn-android i { color: #34d399; /* أخضر أندرويد ناعم */ }
        .btn-android:hover { border-color: rgba(52, 211, 153, 0.4); box-shadow: 0 10px 30px -10px rgba(52, 211, 153, 0.15); }

        .btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1;
        }

        .btn-text span:first-child {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            transition: color 0.4s ease;
        }

        .btn-text span:last-child {
            font-size: 1.05rem;
            font-weight: 800;
            color: #f8fafc;
            letter-spacing: 0.2px;
        }

        .btn:hover .btn-text span:first-child {
            color: #cbd5e1; /* تفتيح النص الصغير عند المرور */
        }

        /* ================= صورة التطبيق ================= */
        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
            opacity: 0;
            animation: zoomIn 1s ease 1s forwards, floatImage 6s ease-in-out infinite 2s;
        }

        .hero-image::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(60px);
            opacity: 0.5;
            animation: pulseGlow 4s infinite alternate;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 
                        0 0 30px rgba(255, 255, 255, 0.05) inset;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: perspective(1000px) rotateY(-5deg) rotateX(5deg);
            transition: transform 0.5s ease;
        }

        .hero-image img:hover {
            transform: perspective(1000px) rotateY(0deg) rotateX(0deg) scale(1.05);
        }

        /* ================= الحركات (Keyframes) ================= */
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floatImage {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        /* ================= تخصيص الموبايل ================= */
        @media (max-width: 992px) {
            header {
                justify-content: center; 
                padding: 1.5rem 5%;
            }
            .hero {
                flex-direction: column;
                text-align: center;
                padding-top: 1.5rem;
                padding-bottom: 3rem;
                gap: 1rem;
            }
            .hero-tagline {
                font-size: 0.8rem;
                padding: 6px 14px;
            }
            .hero-title {
                font-size: 2.4rem; 
                margin-bottom: 1rem;
            }
            .hero-desc {
                font-size: 1rem;
                margin: 0 auto 2rem;
                padding: 0 10px;
                line-height: 1.6;
            }
            
            .download-buttons {
                flex-direction: column;
                align-items: center;
                width: 100%;
                gap: 1rem;
            }
            
            .btn {
                width: 100%;
                max-width: 320px; 
                justify-content: center; 
                padding: 14px 20px;
            }
            
            .hero-image {
                margin-top: 2.5rem;
                width: 100%;
            }
            
            .hero-image::after {
                width: 200px;
                height: 200px;
                filter: blur(40px);
            }
            
            .hero-image img {
                max-width: 85%; 
                transform: none; 
            }
            
            .hero-image img:hover {
                transform: translateY(-5px);
            }
            
            .orb-1 { width: 250px; height: 250px; }
            .orb-2 { width: 300px; height: 300px; }
            .orb-3 { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="orb orb-1"></div>

    <header>

            <div class="download-buttons">

                    <div class="btn-text">

                    </div>
                </a>

                <a href="https://apps.apple.com/iq/app/%D9%85%D8%A8%D8%AF%D8%B9%D9%8A-%D8%A7%D9%84%D9%85%D8%B3%D8%AA%D9%82%D8%A8%D9%84/id6764581830" class="btn btn-ios">

        <div class="hero-image">
            <img src="https://res.cloudinary.com/dgjgwdno2/image/upload/v1779784944/app-screen_oqfifv.png" alt="واجهة تطبيق مبدعي المستقبل" width="450">

    </main>

</body>
</html>
